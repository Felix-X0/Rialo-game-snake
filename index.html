<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rialo Game Snake</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Gambar Tersembunyi untuk Memuat Logo Rialo ke dalam Canvas Game -->
    <img id="rialoLogoSource" src="IMG_3277.jpeg" alt="Rialo Logo Source" style="display: none;">

    <div class="game-container">
        <!-- Header Game -->
        <header>
            <div class="logo-container">
                <img src="IMG_3277.jpeg" alt="Rialo Logo" class="rialo-logo">
            </div>
            <h1>RIALO GAME SNAKE</h1>
            <div class="scoreboard">
                <span id="score">SCORE: 0</span>
                <span id="highScore">HIGH SCORE: 0</span>
            </div>
        </header>

        <!-- Area Bermain (Canvas) -->
        <main class="game-area">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            
            <!-- Layar Game Over / Start -->
            <div id="overlay" class="overlay">
                <h2 id="overlay-title">SPACE MISSION</h2>
                <p id="overlay-text">Tekan tombol di bawah untuk memulai</p>
                <button id="start-btn">MULAI GAME</button>
            </div>
        </main>

        <!-- Papan Peringkat / Leaderboard -->
        <section class="leaderboard-section">
            <h3>🏆 TOP LEADERBOARD</h3>
            <ol id="leaderboard-list">
                <li><span class="rank-name">Felix</span> <span class="rank-score">0</span></li>
                <li><span class="rank-name">Rialo Bot</span> <span class="rank-score">0</span></li>
                <li><span class="rank-name">Player 3</span> <span class="rank-score">0</span></li>
            </ol>
        </section>

        <!-- Tombol Kontrol khusus HP -->
        <div class="mobile-controls">
            <button class="ctrl-btn up" id="ctrl-up">▲</button>
            <div class="middle-row">
                <button class="ctrl-btn left" id="ctrl-left">◀</button>
                <div class="spacer"></div>
                <button class="ctrl-btn right" id="ctrl-right">▶</button>
            </div>
            <button class="ctrl-btn down" id="ctrl-down">▼</button>
        </div>

        <!-- Footer / Kredit Pembuat -->
        <footer>
            <p class="credits">By Felix X Cadis0871</p>
        </footer>
    </div>

    <script src="game.js"></script>
</body>
</html>
