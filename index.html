<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rialo Game Snake</title>
    
    <style>
        /* Reset Dasar & Latar Belakang Hitam */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }
        
        .game-container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        header h1 {
            font-size: 20px;
            letter-spacing: 1px;
            margin: 8px 0;
            color: #ffffff;
        }

        /* Sosial Media Button */
        .social-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 5px;
        }
        .social-btn {
            display: inline-flex;
            align-items: center;
            padding: 6px 14px;
            font-size: 11px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 30px;
            transition: all 0.3s ease;
        }
        .discord-btn {
            background: linear-gradient(135deg, #5865F2, #4752C4);
            color: #ffffff !important;
        }
        .twitter-btn {
            background: linear-gradient(135deg, #14171A, #000000);
            color: #ffffff !important;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Logo Brand */
        .logo-container {
            margin: 5px auto;
        }
        .rialo-logo {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ffdd53;
        }

        /* Skor */
        .scoreboard {
            display: flex;
            justify-content: space-around;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
            color: #ffdd53;
        }

        /* Status Level Bar */
        .game-status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        #level-display {
            color: #ffdd53;
            background: rgba(255, 221, 83, 0.1);
            padding: 3px 8px;
            border-radius: 8px;
            border: 1px solid rgba(255, 221, 83, 0.2);
        }
        #speed-display {
            color: #00ffcc;
            background: rgba(0, 255, 204, 0.1);
            padding: 3px 8px;
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 204, 0.2);
        }

        /* Area Game Canvas */
        .game-area-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #121212;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
            background-color: #121212;
        }

        /* Overlay di Atas Canvas */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(18, 18, 18, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 10;
        }
        #overlay-title {
            font-size: 22px;
            font-weight: 800;
            color: #ffdd53;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        #overlay-text {
            font-size: 12px;
            color: #cccccc;
            margin-bottom: 20px;
        }
        #start-btn {
            background: #ffdd53;
            color: #121212;
            font-weight: 700;
            border: none;
            padding: 12px 28px;
            font-size: 13px;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 221, 83, 0.3);
            transition: transform 0.2s ease;
        }
        #start-btn:hover {
            transform: scale(1.05);
        }

        /* Leaderboard */
        .leaderboard-section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 12px;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .leaderboard-section h3 {
            font-size: 13px;
            color: #ffdd53;
            margin-bottom: 8px;
            text-align: center;
        }
        #leaderboard-list {
            list-style: none;
            font-size: 13px;
        }
        #leaderboard-list li {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        footer {
            margin-top: 5px;
            font-size: 11px;
            opacity: 0.6;
        }
        .footer-link {
            color: #ffdd53;
            text-decoration: none;
        }
    </style>
</head>
