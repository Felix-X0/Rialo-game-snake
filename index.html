<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Snake Game</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        .game-area-wrapper {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .overlay {
            background: rgba(18, 18, 18, 0.85) !important;
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            border: 1px solid rgba(255, 221, 83, 0.2);
            transition: all 0.5s ease;
        }
        #overlay-title {
            font-size: 26px !important;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 800;
            color: #ffdd53 !important;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255, 221, 83, 0.4);
            margin-bottom: 8px;
        }
        #overlay-text {
            font-size: 13px !important;
            color: #cccccc !important;
            font-family: -apple-system, sans-serif;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        #start-btn {
            background: #ffdd53 !important;
            color: #121212 !important;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 700 !important;
            border: none !important;
            padding: 14px 36px !important;
            font-size: 14px !important;
            border-radius: 30px !important;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 221, 83, 0.3) !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
            letter-spacing: 0.5px;
        }
        #start-btn:hover {
            transform: scale(1.05) !important;
            box-shadow: 0 12px 30px rgba(255, 221, 83, 0.5) !important;
        }
        .footer-link {
            color: #ffdd53 !important;
            text-decoration: none;
            font-weight: 600;
            margin-left: 4px;
        }
        .mobile-controls {
            display: none !important;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>

    <img id="rialoLogoSource" src="IMG_3910.png" style="display: none;">
    <img id="snakeHeadImg" src="IMG_3910.png" style="display: none;">
    <img id="snakeBodyImg" src="IMG_3921.jpg" style="display: none;">

    <div class="game-container">
        <header>
            <div class="logo-container">
                <img src="IMG_3910.png" alt="Game Logo" class="rialo-logo">
            </div>
            <h1>SNAKE II RETRO</h1>
            <div class="scoreboard">
                <span id="score">SCORE: 0</span>
                <span id="highScore">HIGH SCORE: 0</span>
            </div>
            <p style="font-size: 11px; color: rgba(255,255,255,0.6); margin: 6px 0 0 0; font-family: -apple-system, sans-serif; letter-spacing: 0.3px;">
                ✨ Mobile Control: **Swipe** anywhere on the screen to turn!
            </p>
        </header>

        <div class="game-area-wrapper">
            <main class="game-area" id="swipeGameArea">
                <canvas id="gameCanvas" width="400" height="400"></canvas>
                
                <div id="overlay" class="overlay">
                    <h2 id="overlay-title">🛸 SPACE MISSION</h2>
                    <p id="overlay-text">Swipe your phone screen to control the mission.</p>
                    <button id="start-btn">START GAME</button>
                </div>
            </main>
        </div>

        <section class="leaderboard-section">
            <h3>🏆 TOP 5 GLOBAL LEADERBOARD</h3>
            <ol id="leaderboard-list">
                <li><span class="rank-name">Loading data...</span></li>
            </ol>
        </section>

        <footer>
            <p class="credits">
                By Felix X Cadis0871 
                <a href="https://x.com/felixxx_0x?s=21" target="_blank" class="footer-link">(@felixxx_0x)</a>
            </p>
        </footer>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBu58SPDb6V6hIyFoxnYgoPia90N1c-7iA",
            authDomain: "game-leaderboard-9498c.firebaseapp.com",
            databaseURL: "https://game-leaderboard-9498c-default-rtdb.firebaseio.com",
            projectId: "game-leaderboard-9498c",
            storageBucket: "game-leaderboard-9498c.firebasestorage.app",
            messagingSenderId: "11880113468",
            appId: "1:11880113468:web:5b6136228a99dde4756a39",
            measurementId: "G-FE3Q7JB02X"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
    </script>
    <script src="game.js"></script>
</body>
</html>
